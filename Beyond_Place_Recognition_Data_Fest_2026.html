1.71 3.27.16.94.36 3.08.2 4.75-1.8 18.96-9.61 64.97-13.58 86.2-1.68 8.98-4.98 11.99-8.18 12.29-6.95.64-12.23-4.6-18.96-9.01-10.53-6.9-16.48-11.2-26.7-17.94-11.82-7.78-4.16-12.06 2.58-19.05 1.76-1.83 32.4-29.7 32.99-32.22.07-.32.14-1.5-.56-2.12s-1.73-.41-2.48-.24c-1.06.24-17.9 11.37-50.53 33.39-4.78 3.28-9.11 4.88-12.99 4.8-4.28-.09-12.51-2.42-18.63-4.41-7.5-2.44-13.46-3.73-12.94-7.87.27-2.16 3.24-4.37 8.91-6.62z\" fill=\"#fff\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"qr-label\">Telegram<\u002Fdiv>\n        <div class=\"qr-url\" style=\"white-space: nowrap;\">t.me/alexmelekhin<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<!-- Speaker notes: one entry per slide, positional (RU). -->\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Всем привет! Меня зовут Саша Мелехин, я инженер Центра Робототехники Сбера, и занимаюсь разработкой и исследованиями в области распознавания места и глобальной локализации. В этом докладе я расскажу, почему в реальных робототехнических системах недостаточно одного только Place Recognition , и что же еще нужно, чтобы научить роботов глобальной локализации\",\n  \"Слайд с информацией обо мне - слайды будут доступны публично, ссылки будут в конце, можно будет вернуться и вспомнить\",\n  \"В этом докладе мы пройдем полный путь от определений к обсуждению требований: разберемся, что такое place recognition, обсудим почему его недостаточно, определим Global Localization как систему и обсудим требования к этой системе.\",\n  \"Итак, чтобы нам было понятнее \\\"почему одного Place Recognition недостаточно\\\", нужно сначала определить \\\"а что такое Place Recognition\\\".\\nPlace Recognition отвечает на вопрос \\\"Я уже видел похожее место?\\\". Он получает на вход данные сенсоров - это могут быть изображения с камеры, лидарные облака точек и т.п. - затем кодирует эти изображения нейросетевым энкодером и возвращает эмбеддинг-дескриптор. По этому эмбеддингу мы ищем наиболее похожих соседей в базе данных.\\nТо есть Place Recognition возвращает не конкретную позу, а ранжированный список кандидатов - это важно понимать.\",\n  \"Как же нам измерить качество Place Recognition?\\nОбычно для этого используется метрика Recall@1.\\nОна спрашивает - \\\"правильное место оказалось первым?\\\"\\n\\nТо есть Recall@1 это доля запросов, на которые модель смогла вернуть правильный ответ в топ-1. \\n\\nПри этом сам критерий \\\"верно\\\" обычно определяется либо по расстоянию, например, \\\"в радиусе 25 метров от истинного положения\\\", либо по метке в датасете.\\n\\nЭта метрика определяет, нашли ли мы правильное место - но не определяет, сможем ли мы локализоваться дальше.\",\n  \"Современные модели Place Recognition показывают сто процентов Recall@1 на отдельных бенчмарках — например, Pair-VPR на Tokyo 24/7. На первый взгляд кажется, что задача решена. Но Place Recognition - это просто этап, он не определяет успешность локализации в целом.\",\n  \"Place Recognition дает список из топ-к мест.\\n\\nА роботу же нужна метрическая поза на карте, эта поза должна быть согласована, очень полезно иметь оценку уверенности и уметь явно сообщать, когда нам не удалось корректно локализоваться.\\n\\nКак же нам решить подобную задачу, и получить всю эту информацию?\",\n  \"Давайте посмотрим на пространство возможных решений.\\n\\nПервый вариант — взять и обучить одну нейросеть, которая по данным сенсора сразу выдаёт позу. И так действительно можно сделать.\\nНо на практике системы устроены сложнее: они разделяют генерацию гипотез, их верификацию и уточнение позы. На слайде подходы разложены по двум осям — возвращаем ли мы только место или ещё и позу, и связаны ли стадии между собой или разделены.\\n\\nВариант слева вверху — это отдельный Place Recognition: просто, быстро, полезно, но в одиночку для метрической локализации недостаточно. \\n\\nВариант справа внизу — та самая привлекательная DL-идея «сенсор сразу в позу», но её трудно сделать надежной.\\n\\nНаш выбор — вариант B: retrieve, verify, refine.\",\n  \"И в этом пайплайне Place Recognition становится просто первой стадией. Он генерирует кандидатов -- гипотезы места, а дальше уже остальной пайплайн выполняет проверку и уточнение и принимает финальное решение.\",\n  \"Давайте разберём этот пайплайн.\\n\\nНа вход приходит кадр или скан с сенсора.\\n\\nСтадия generate — это Place Recognition, он выдаёт top-K гипотез места.\\n\\nСтадия verify — геометрическая верификация проверяет, согласуются ли эти гипотезы с тем, что мы реально наблюдаем.\\n\\nСтадия refine — уточнение, оно превращает гипотезу в метрическую позу в карте.\\n\\nИ стадия decide — решение: принять позу, отложить и подождать новых наблюдений, либо отвергнуть.\\n\\nОбратите внимание на красную стрелку обратной связи: если мы отвергаем результат, мы возвращаемся за новыми наблюдениями и новыми гипотезами. \\n\\nВ таком пайплайне Place Recognition не обязан быть идеальным в одиночку — ему нужно лишь выдавать полезные гипотезы, которые остальная система сможет проверить.\",\n  \"Какие же \\\"проверки\\\" могут быть в системе?\\n\\nВот цепочка: кандидат — проверенная гипотеза — уточнённая поза — и наконец accept или reject.\\n\\nИ чтобы пройти эту цепочку, пайплайн должен ответить на пять вопросов. \\n\\nЭто действительно то место?\\nСогласована ли геометрия?\\nКакова метрическая поза?\\nАктуальна ли карта?\\nИ можно ли всему этому доверять?\\n\\nМы больше не спрашиваем, выглядит ли top-1 правильным — мы спрашиваем, может ли вся система превратить кандидата в безопасное решение о локализации.\\n\\nСледующие слайды будут посвящены этим проверкам.\",\n  \"Первая проблема в том, что разные места могут выглядеть практически одинаково: коридоры, ряды парковки, повторяющиеся фасады, типовые улицы.\\n\\nА ретривал всегда вернёт нам ближайшего соседа в пространстве дескрипторов — даже если это другое место, просто очень похожее на нужное.\\n\\nНа схеме три кандидата с почти одинаковым score — и по одной только похожести их не различить.\\nТо есть top-1 может быть уверенно неверным.\\nTop-K немного помогает, но проблему не решает.\\n\\nПоэтому нам недостаточно просто Place Recognition - нам нужно перепроверять и реранжировать результаты.\",\n  \"Проверка вторая — шаг от ретривала к настоящей локализации.\\nPlace Recognition говорит: «это место похоже» — он рассуждает в терминах похожести.\\nА геометрия задаёт другой вопрос: «может ли эта поза объяснить то, что я сейчас вижу?» — это уже про согласованность.\\nУ плохого кандидата соответствия не сойдутся: высокий residual, противоречивые матчи — как в правом примере. У хорошего кандидата — согласованное преобразование.\\n\\nГлавную мысль я бы сформулировал так: ретривал — это про похожесть, а верификация — про согласованность, что ключевые точки действительно расположены одинаково. И решает именно геометрия.\",\n  \"Проверка третья, и для многих она неочевидна: место — это ещё не поза.\\nДопустим, top-1 действительно верный, мы попали в нужное место. \\nНо робот всё равно не знает свою точную позу. \\nРетривал дал нам регион или ключевой кадр, а роботу нужны конкретные x, y, тета — или полная поза.\\nВ пределах одного и того же коридора он может быть сдвинут на несколько метров, может смотреть в другую сторону, наблюдать сцену под другим ракурсом.\\nЗдесь важны точка обзора, масштаб, геометрия сенсора.\\n\\nПоэтому позу нужно отдельно уточнить и проверить: retrieval даёт регион, а refinement даёт координаты.\",\n  \"Проверка четвёртая — карта не вечна.\\nРобот локализуется относительно карты, но сама карта со временем может стать неверной.\\nСреда меняется: уехали машины с парковки, передвинули мебель, сменился сезон, началась стройка, изменилась погода.\\nКарта бывает неполной или просто устаревшей.\\nИ больше того — сами метки, GPS и позы, по которым мы оцениваем качество, тоже шумные.\\n\\nЕсли карта устарела, то даже очень сильный recognizer выдаёт ответы, которые трудно верифицировать и небезопасно использовать.\\n\\nПоэтому нам хочется, чтобы система умела сообщать о несоответствиях и сигнализировать о том, что карту необходимо обновить.\",\n  \"И проверка пятая, финальная — это решение, уверенность и возможность отказа.\\n\\nИногда самый правильный ответ системы — честное «не знаю».\\n\\nФинальная стадия пайплайна — именно решение: зафиксировать позу, подержать несколько гипотез и подождать, либо отвергнуть результат.\\n\\nПри этом важно понимать: системе нужен явный accept или reject, то есть мы должны явно задать правило, а не просто возвращать метрику уверенности.\\n\\nИ главный тезис здесь: уверенно неверная локализация хуже, чем её отсутствие. Робот, который честно говорит «я потерялся», безопаснее робота, который уверенно локализуется не там.\",\n  \"Итак.\\n\\nДавайте подведём итоги и вернёмся к главному тезису. \\n\\nPlace Recognition предлагает.\\n\\nGlobal Localization верифицирует, уточняет и принимает решение.\\n\\nТри вывода, которые я хочу, чтобы вы унесли с собой.\\n\\nПервое: сто процентов Recall@1 ещё не значит, что робот локализован.\\nВторое: Place Recognition — это генератор гипотез, а не полноценная система локализации.\\nИ третье: настоящей глобальной локализации нужны карта, геометрия, уточнение позы и логика принятия решения.\\n\\nЕсли совсем коротко: Place Recognition отвечает на вопрос «на какое место это похоже?», а Global Localization — на вопрос «где я на карте, и можно ли доверять этой позе?»\",\n  \"На этом всё — спасибо за внимание! Здесь два QR-кода: слева — репозиторий с этими слайдами на GitHub, справа — мой телеграм для связи. Буду рад вопросам и комментариям\"\n]\n<\u002Fscript>\n\n<script src=\"27e91777-60d0-4e4b-8f37-44338a5d78b1\"><\u002Fscript>\n<script>\n  (function () {\n    function renderQR(el, text) {\n      if (!el) return;\n      var qr = qrcode(0, 'H');\n      qr.addData(text);\n      qr.make();\n      var n = qr.getModuleCount();\n      var px = 600, c = px / n, rects = '';\n      for (var r = 0; r < n; r++) {\n        for (var col = 0; col < n; col++) {\n          if (qr.isDark(r, col)) {\n            rects += '<rect x=\"' + (col * c).toFixed(2) + '\" y=\"' + (r * c).toFixed(2) +\n              '\" width=\"' + c.toFixed(2) + '\" height=\"' + c.toFixed(2) + '\"/>';\n          }\n        }\n      }\n      el.innerHTML = '<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ' + px + ' ' + px +\n        '\"><rect width=\"' + px + '\" height=\"' + px + '\" fill=\"#ffffff\"/>' +\n        '<g fill=\"#0d0d0f\">' + rects + '<\u002Fg><\u002Fsvg>';\n    }\n    function go() {\n      renderQR(document.getElementById('qr-github'),\n        'https://github.com/alexmelekhin/datafest2026_beyond_place_recognition');\n      renderQR(document.getElementById('qr-telegram'), 'https://t.me/alexmelekhin');\n    }\n    if (window.qrcode) go();\n    else window.addEventListener('load', go);\n  })();\n<\u002Fscript>\n<script src=\"7d475891-6135-4bea-89f3-399b9f592863\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
